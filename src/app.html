<!doctype html>
<html lang="%lang%">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
		/>
		<script>
			// Pick the persisted theme before render so the initial loading screen
			// (shown between the splash and the app) isn't a white flash in dark mode.
			(function () {
				try {
					var s = JSON.parse(localStorage.getItem("userSettings") || "{}");
					var mode = s && s.themeMode;
					var dark =
						mode === "dark" ||
						((!mode || mode === "system") &&
							window.matchMedia("(prefers-color-scheme: dark)").matches);
					if (dark) document.documentElement.classList.add("theme-dark-preload");
				} catch (e) {}
			})();
		</script>
		<style>
			html {
				background: oklch(1 0 0);
			}
			html.theme-dark-preload {
				background: oklch(0.145 0 0);
			}
			#initial-loader {
				position: fixed;
				inset: 0;
				z-index: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				background: inherit;
			}
			#initial-loader img {
				width: 88px;
				height: 88px;
				animation: il-pulse 1.4s ease-in-out infinite;
			}
			@keyframes il-pulse {
				0%,
				100% {
					opacity: 0.5;
				}
				50% {
					opacity: 1;
				}
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="initial-loader"><img src="%sveltekit.assets%/favicon.png" alt="Diadem" /></div>
		<div style="display: contents; height: 100%">%sveltekit.body%</div>
	</body>
</html>
